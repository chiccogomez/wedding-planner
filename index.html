<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A1612">

  <!-- PWA / Home Screen -->
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="C & M ♡">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">

  <title>Chicco &amp; Michelle</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root { min-height: 100%; min-height: 100dvh; }
    body { background: #F5F0E8; overscroll-behavior: none; }

    /* Safe area insets for notched phones */
    #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #F5F0E8;
      font-family: 'Cormorant Garamond', Georgia, serif;
      gap: 12px;
      z-index: 9999;
      transition: opacity 0.4s;
    }
    #loading .name  { font-size: 28px; font-weight: 300; letter-spacing: 0.12em; color: #1A1612; }
    #loading .date  { font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; color: #A0785A; }
    #loading .dot   { width: 6px; height: 6px; background: #C8A96E; transform: rotate(45deg); margin-top: 8px; }
    #loading.hidden { opacity: 0; pointer-events: none; }

    /* Prevent pull-to-refresh on iOS */
    body { overscroll-behavior-y: contain; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #DDD5C0; border-radius: 2px; }
  </style>
</head>
<body>

  <div id="loading">
    <div class="date">January 15, 2027</div>
    <div class="name">Chicco &amp; Michelle</div>
    <div class="dot"></div>
  </div>

  <div id="root"></div>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel for JSX (browser transform) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () =>
        navigator.serviceWorker.register('/sw.js')
          .then(() => console.log('SW registered'))
          .catch(e => console.log('SW failed:', e))
      );
    }
  </script>

  <!-- App -->
  <script type="text/babel" src="/app.jsx" data-type="module"></script>

</body>
</html>
